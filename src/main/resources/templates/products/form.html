<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common-header :: common-header(title='Управление товаром')}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<header th:replace="~{fragments/header :: navbar}"></header>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 fw-bold" th:text="${productId != null} ? 'Редактировать товар' : 'Новый товар'">
                            Новый товар
                        </h4>
                        <a th:href="@{/products}" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i> Назад
                        </a>
                    </div>
                    <div class="card-body p-4">
                        
                        <!-- Форма -->
                        <!-- Отправляем на REST API endpoint, который ты уже создал -->
                        <form id="productForm" th:action="${productId != null} ? @{/products/api/{id}(id=${productId})} : @{/products/api}" 
                              method="post" 
                              th:object="${productDto}">
                            
                            <!-- Скрытый метод для PUT запроса при редактировании -->
                            <input type="hidden" name="_method" th:value="${productId != null} ? 'PUT' : 'POST'"/>

                            <div class="mb-3">
                                <label class="form-label">Название товара *</label>
                                <input type="text" class="form-control" th:field="*{name}" required placeholder="Например: Круассан с миндалем">
                                <div class="invalid-feedback">Название обязательно</div>
                            </div>

                            <div class="mb-3">
                                <div class="mb-3">
                                    <label class="form-label">Категория *</label>
                                    <select class="form-select" th:field="*{categoryId}" required>
                                        <option value="">Выберите категорию</option>
                                        <option th:each="cat : ${categories}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.name}">
                                            Категория
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Цена (₽) *</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price}" required placeholder="0.00">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">URL изображения</label>
                                    <input type="url" class="form-control" th:field="*{imageUrl}" placeholder="https://...">
                                    <small class="text-muted">Оставьте пустым для картинки по умолчанию</small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Описание</label>
                                <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Состав, вес, особенности..."></textarea>
                            </div>

                            <div class="alert alert-danger d-none" id="errorAlert"></div>
                            <div class="alert alert-success d-none" id="successAlert">
                                Товар успешно сохранен! <a th:href="@{/products}" class="alert-link">Перейти в каталог</a>.
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-save me-2"></i>Сохранить товар
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app-config.js}"></script>

<script>
$(document).ready(function() {
    $('#productForm').on('submit', function(e) {
        e.preventDefault();
        
        const form = $(this);
        const submitBtn = form.find('button[type="submit"]');
        const errorAlert = $('#errorAlert');
        const successAlert = $('#successAlert');
        
        // Сброс сообщений
        errorAlert.addClass('d-none').text('');
        successAlert.addClass('d-none');
        submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i>Сохранение...');

        const url = form.attr('action');
        const method = form.find('input[name="_method"]').val() || 'POST';
        
        // Сбор данных формы
        const formData = {
            name: form.find('[name="name"]').val(),
            categoryId: form.find('[name="categoryId"]').val(),
            price: form.find('[name="price"]').val(),
            imageUrl: form.find('[name="imageUrl"]').val(),
            description: form.find('[name="description"]').val()
        };

        $.ajax({
            url: url,
            type: method,
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function(response) {
                successAlert.removeClass('d-none');
                form.trigger('reset');
                // Если это создание нового, можно перенаправить
                if (method === 'POST') {
                    setTimeout(() => { window.location.href = '/products'; }, 1500);
                } else {
                    submitBtn.prop('disabled', false).html('<i class="fas fa-check me-2"></i>Сохранено');
                }
            },
            error: function(xhr) {
                errorAlert.removeClass('d-none').text('Ошибка: ' + (xhr.responseJSON?.message || xhr.statusText));
                submitBtn.prop('disabled', false).html('<i class="fas fa-save me-2"></i>Сохранить товар');
            }
        });
    });
});
</script>

</body>
</html>
