<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/common-header :: common-header(title='Мои заказы')}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<header th:replace="~{fragments/header :: navbar}"></header>

<main class="flex-grow-1 py-5">
    <div class="container">
        
        <!-- Заголовок -->
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="fw-bold"><i class="fas fa-box-open me-2"></i>История заказов</h2>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Главная</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/profile}" class="text-decoration-none">Профиль</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Мои заказы</li>
                    </ol>
                </nav>
            </div>
        </div>

        <!-- Сообщение об ошибке -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${error}">Ошибка загрузки</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Список заказов -->
        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 bg-white rounded shadow-sm">
            <i class="fas fa-receipt fa-4x text-muted mb-3"></i>
            <h4 class="text-muted">У вас пока нет заказов</h4>
            <p class="text-secondary">Оформите свой первый заказ в нашем каталоге!</p>
            <a th:href="@{/products}" class="btn btn-primary mt-3 px-4">Перейти в каталог</a>
        </div>

        <div class="row g-4" th:unless="${#lists.isEmpty(orders)}">
            <div class="col-12" th:each="order : ${orders}">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div>
                            <h5 class="mb-0 fw-bold">
                                <span class="text-muted">#</span><span th:text="${order.id}">123</span>
                            </h5>
                            <small class="text-muted">
                                <i class="far fa-calendar-alt me-1"></i>
                                <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</span>
                            </small>
                        </div>
                        <div>
                            <span class="badge fs-6"
                                  th:classappend="${order.status.name() == 'NEW'} ? 'bg-primary' : 
                                                  (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 
                                                  (${order.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark'))"
                                  th:text="${#strings.toUpperCase(order.status.name())}">NEW</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-borderless mb-0">
                                <thead class="table-light small">
                                    <tr>
                                        <th>Товар</th>
                                        <th class="text-center">Кол-во</th>
                                        <th class="text-end">Цена</th>
                                        <th class="text-end">Сумма</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${order.items}">
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/40'}" 
                                                     class="rounded me-2" style="width: 40px; height: 40px; object-fit: cover;" alt="Товар">
                                                <span class="fw-medium" th:text="${item.product.name}">Товар</span>
                                            </div>
                                        </td>
                                        <td class="text-center" th:text="${item.quantity}">1</td>
                                        <td class="text-end text-muted" th:text="${item.price} + ' ₽'">100 ₽</td>
                                        <td class="text-end fw-bold" th:text="${item.price * item.quantity} + ' ₽'">100 ₽</td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold fs-5">Итого:</td>
                                        <td class="text-end fw-bold fs-5 text-primary" th:text="${order.totalAmount} + ' ₽'">1000 ₽</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white text-end py-3">
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-primary btn-sm">
                            <i class="fas fa-eye me-1"></i> Подробнее
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app-config.js}"></script>

</body>
</html>
