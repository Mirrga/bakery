<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/common-header :: common-header(title='Заказ #' + ${order.id})}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<header th:replace="~{fragments/header :: navbar}"></header>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <!-- Заголовок и статус -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Заказ №<span th:text="${order.id}">123</span></h2>
                    <p class="text-muted" th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</p>
                    
                    <span class="badge fs-6 px-3 py-2"
                          th:classappend="${order.status.name() == 'NEW'} ? 'bg-primary' : (${order.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark')"
                          th:text="${#strings.toUpperCase(order.status.name())}">NEW</span>
                </div>

                <!-- Сообщение об успехе (если было добавлено в redirectAttributes) -->
                <div th:if="${success}" class="alert alert-success text-center mb-4" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger text-center mb-4" th:text="${error}"></div>

                <!-- Карточка с деталями заказа -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">Состав заказа</h5>
                        <span class="text-muted small">Товаров: <span th:text="${#lists.size(order.items)}">0</span></span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Товар</th>
                                        <th class="text-center">Цена</th>
                                        <th class="text-center">Кол-во</th>
                                        <th class="text-end pe-4">Сумма</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${order.items}">
                                        <td class="ps-4">
                                            <div class="d-flex align-items-center">
                                                <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/60'}" 
                                                     class="rounded me-3" alt="Product" style="width: 60px; height: 60px; object-fit: cover;">
                                                <div>
                                                    <h6 class="mb-0 fw-bold" th:text="${item.product.name}">Название товара</h6>
                                                    <small class="text-muted" th:text="${item.product.price} + ' ₽'">0 ₽</small>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="text-center" th:text="${item.price} + ' ₽'">0 ₽</td>
                                        <td class="text-center">
                                            <span class="badge bg-secondary fs-6" th:text="${item.quantity}">1</span>
                                        </td>
                                        <td class="text-end pe-4 fw-bold" th:text="${item.price * item.quantity} + ' ₽'">0 ₽</td>
                                    </tr>
                                </tbody>
                                <tfoot class="bg-light">
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold fs-5 ps-4">Итого:</td>
                                        <td class="text-end pe-4 fw-bold fs-4 text-danger" th:text="${order.totalAmount} + ' ₽'">0 ₽</td>
                                    </tr>
                                    <!-- Отображение суммы в USD, если доступно -->
                                    <tr th:if="${showUsd}">
                                        <td colspan="3" class="text-end text-muted small ps-4">≈ в USD (курс <span th:text="${currentUsdRate}">0</span>):</td>
                                        <td class="text-end pe-4 text-muted small" th:text="${totalInUsd} + ' $'">0 $</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Кнопки действий -->
                <div class="d-flex justify-content-center gap-3">
                    <a th:href="@{/products}" class="btn btn-outline-primary px-4">
                        <i class="fas fa-arrow-left me-2"></i>Вернуться в каталог
                    </a>
                    <a th:href="@{/orders/my}" class="btn btn-secondary px-4">
                        <i class="fas fa-list me-2"></i>Мои заказы
                    </a>
                </div>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app-config.js}"></script>

</body>
</html>
