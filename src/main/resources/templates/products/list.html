<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- 1. ИСПРАВЛЕНО: Подключаем голову корректно -->
    <!-- Убедитесь, что во фрагменте common-header есть подключение Bootstrap CSS и FontAwesome -->
    <th:block th:replace="~{fragments/common-header :: common-header(title='Каталог выпечки')}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- 2. Подключаем меню -->
    <header th:replace="~{fragments/header :: navbar}"></header>

    <main class="flex-grow-1 container mt-5">
        <h1 class="mb-4 text-center">🥐 Свежая выпечка</h1>

        <!-- Проверка на пустоту списка -->
        <div th:if="${products.empty}" class="text-center py-5">
            <p class="text-muted">Товары пока не добавлены.</p>
            <a th:href="@{/}" class="btn btn-primary">На главную</a>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4" th:unless="${products.empty}">
            <div class="col" th:each="product : ${products.content}">
                <div class="card h-100 shadow-sm border-0 transition-hover">
                    <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x200?text=Bakery'}" 
                         class="card-img-top" alt="Товар" style="height: 200px; object-fit: cover;">
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" th:text="${product.name}">Название</h5>
                        <p class="card-text text-muted small" th:text="${product.category != null ? product.category.name : 'Без категории'}">Категория</p>
                        <p class="card-text flex-grow-1" th:text="${#strings.abbreviate(product.description, 100)}">Описание</p>
                        
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="fs-5 fw-bold text-danger" th:text="${product.price} + ' ₽'">0 ₽</span>
                            <button class="btn btn-outline-primary btn-sm add-to-cart-btn" 
                                    th:data-product-id="${product.id}">
                                <i class="fas fa-cart-plus me-1"></i> В корзину
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Пагинация -->
        <nav aria-label="Page navigation" class="mt-5" th:if="${products.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${products.number - 1})}">← Назад</a>
                </li>
                <li class="page-item active">
                    <span class="page-link" th:text="${products.number + 1} + ' из ' + ${products.totalPages}">1</span>
                </li>
                <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${products.number + 1})}">Вперед →</a>
                </li>
            </ul>
        </nav>
    </main>

    <!-- 3. ФУТЕР -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- 4. ВАЖНО: Элемент уведомления (Toast), которого не хватало -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">
                    Товар добавлен!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- 5. Подключение скриптов (Порядок важен!) -->
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS (нужен для работы Toast) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Ваш скрипт -->
    <script>
        $(document).ready(function() {
            // Функция показа уведомления
            function showToast(message, isError) {
                const toastEl = document.getElementById('liveToast');
                const toastBody = document.getElementById('toast-message');
                
                if (!toastEl) {
                    console.error("Элемент liveToast не найден в DOM!");
                    alert(message); // Фоллбэк, если-toast не создан
                    return;
                }

                toastBody.textContent = message;
                
                if (isError) {
                    toastEl.classList.remove('bg-success');
                    toastEl.classList.add('bg-danger');
                } else {
                    toastEl.classList.remove('bg-danger');
                    toastEl.classList.add('bg-success');
                }
                
                // Создаем экземпляр Toast и показываем
                const toast = new bootstrap.Toast(toastEl);
                toast.show();
            }

            // Обработчик кнопки "В корзину"
            $('.add-to-cart-btn').click(function(e) {
                e.preventDefault();
                let btn = $(this);
                let productId = btn.data('product-id');
                
                // Сохраняем оригинальный текст кнопки
                let originalContent = btn.html();

                // Блокируем кнопку на время запроса
                btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i>');

                $.ajax({
                    url: '/cart/add',
                    type: 'POST',
                    data: { productId: productId, quantity: 1 },
                    success: function(response) {
                        if(response.success) {
                            showToast('Товар добавлен в корзину! 🥐');
                            
                            // Анимация успеха
                            btn.removeClass('btn-outline-primary').addClass('btn-success').html('<i class="fas fa-check"></i> Добавлено');
                            
                            setTimeout(() => {
                                btn.removeClass('btn-success').addClass('btn-outline-primary').html(originalContent);
                                btn.prop('disabled', false);
                                
                                // Опционально: обновить счетчик в хедере, если он есть
                                // updateCartBadge(); 
                            }, 1500);
                        } else {
                            showToast(response.message || 'Ошибка добавления', true);
                            btn.prop('disabled', false).html(originalContent);
                        }
                    },
                    error: function(xhr) {
                        console.error(xhr);
                        let errorMsg = 'Произошла ошибка сервера';
                        if (xhr.status === 401 || xhr.status === 403) {
                             errorMsg = 'Необходимо войти в систему';
                             // Можно сделать редирект на логин через 2 секунды
                             setTimeout(() => window.location.href='/auth/login', 2000);
                        }
                        showToast(errorMsg, true);
                        btn.prop('disabled', false).html(originalContent);
                    }
                });
            });
        });
    </script>

    <!-- Дополнительные стили для анимации карточек (если нет в общем CSS) -->
    <style>
        .transition-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .transition-hover:hover { transform: translateY(-5px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
    </style>
</body>
</html>
