<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/common-header :: common-header(title='Профиль пользователя')}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<!-- Хедер -->
<header th:replace="~{fragments/header :: navbar}"></header>

<main class="flex-grow-1 py-5">
    <div class="container">
        
        <!-- Заголовок -->
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="fw-bold"><i class="fas fa-user-circle me-2"></i>Личный кабинет</h2>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Главная</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Профиль</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="row g-4">
            
            <!-- ЛЕВАЯ КОЛОНКА: Информация о пользователе -->
            <div class="col-lg-4">
                <!-- Карточка профиля -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body text-center p-4">
                        <div class="mb-3">
                            <div class="rounded-circle bg-warning text-dark d-inline-flex align-items-center justify-content-center fw-bold" 
                                 style="width: 100px; height: 100px; font-size: 2rem;">
                                <span th:text="${#strings.toUpperCase(#strings.substring(user.firstName, 0, 1)) + #strings.toUpperCase(#strings.substring(user.lastName, 0, 1))}">ИФ</span>
                            </div>
                        </div>
                        <h4 class="fw-bold mb-1" th:text="${user.firstName + ' ' + user.lastName}">Имя Фамилия</h4>
                        <p class="text-muted mb-3" th:text="${user.email}">email@example.com</p>
                        
                        <hr class="my-3">
                        
                        <div class="d-grid gap-2">
                            <a th:href="@{/logout}" class="btn btn-outline-danger">
                                <i class="fas fa-sign-out-alt me-2"></i>Выйти
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Карточка бонусов -->
                <div class="card shadow-sm border-0 bg-warning text-dark">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0">Бонусный баланс</h5>
                            <i class="fas fa-gift fa-2x opacity-50"></i>
                        </div>
                        <div class="display-6 fw-bold mb-1" th:text="${user.bonusBalance} + ' ₽'">0 ₽</div>
                        <p class="small text-muted mb-0">Накоплено с покупок</p>
                        <button class="btn btn-dark w-100 mt-3 btn-sm" disabled>
                            <i class="fas fa-lock me-1"></i> Скоро оплата бонусами
                        </button>
                    </div>
                </div>
            </div>

            <!-- ПРАВАЯ КОЛОНКА: История заказов -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">История заказов</h5>
                        <span class="badge bg-secondary" th:text="${#lists.size(orders)}">0</span>
                    </div>
                    <div class="card-body p-0">
                        
                        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
                            <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
                            <h5 class="text-muted">У вас пока нет заказов</h5>
                            <a th:href="@{/products}" class="btn btn-primary mt-3">Перейти к покупкам</a>
                        </div>

                        <div class="table-responsive" th:unless="${#lists.isEmpty(orders)}">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">№ Заказа</th>
                                        <th>Дата</th>
                                        <th>Сумма</th>
                                        <th>Статус</th>
                                        <th class="text-end pe-4">Действие</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="order : ${orders}">
                                        <td class="ps-4 fw-bold" th:text="'#' + ${order.id}">#123</td>
                                        <td>
                                            <div class="small" th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy')}">01.01.2024</div>
                                            <div class="text-muted small" th:text="${#temporals.format(order.createdAt, 'HH:mm')}">12:00</div>
                                        </td>
                                        <td class="fw-bold" th:text="${order.totalAmount} + ' ₽'">1000 ₽</td>
                                        <td>
                                            <!-- Цвета для статусов -->
                                            <span class="badge" 
                                                  th:classappend="${order.status.name() == 'NEW'} ? 'bg-primary' : (${order.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark')"
                                                  th:text="${#strings.toUpperCase(order.status.name())}">NEW</span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                                Подробнее
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Футер -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app-config.js}"></script>

</body>
</html>
