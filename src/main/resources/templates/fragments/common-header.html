<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="common-header(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSRF Meta Tags (Обязательно для Spring Security + AJAX) -->
   

    <title th:text="${title} ?: 'Bakery Shop'">Bakery Shop</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Кастомные стили (предполагается, что style.css существует) -->
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <!-- jQuery (Обязательно до наших скриптов) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Наш глобальный конфиг AJAX -->
    <script th:src="@{/js/app-config.js}"></script>
</head>
<body>
<!-- Этот body пустой, фрагмент используется только внутри head других страниц -->
</body>
</html>
