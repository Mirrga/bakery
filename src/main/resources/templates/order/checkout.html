<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/common-header :: common-header(title='Оформление заказа')}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<header th:replace="~{fragments/header :: navbar}"></header>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <!-- Заголовок -->
                <div class="text-center mb-4">
                    <h2 class="fw-bold"><i class="fas fa-check-circle me-2"></i>Подтверждение заказа</h2>
                    <p class="text-muted">Нажмите кнопку ниже, чтобы оформить заказ</p>
                </div>

                <!-- Сообщение, если корзина пуста -->
                <div th:if="${cart.items == null || cart.items.empty}" class="alert alert-warning text-center">
                    <i class="fas fa-exclamation-triangle me-2"></i>Ваша корзина пуста!
                    <a th:href="@{/products}" class="alert-link ms-2">Перейти к покупкам</a>
                </div>

                <!-- Список товаров и кнопка -->
                <div th:unless="${cart.items == null || cart.items.empty}" class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold">Вы заказываете:</h5>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center" th:each="item : ${cart.items}">
                                <div class="d-flex align-items-center">
                                    <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/50'}" 
                                         class="rounded me-3" style="width: 50px; height: 50px; object-fit: cover;">
                                    <div>
                                        <h6 class="mb-0" th:text="${item.product.name}">Товар</h6>
                                        <small class="text-muted">
                                            <span th:text="${item.quantity}">1</span> шт. × 
                                            <span th:text="${item.product.price}">0</span> ₽
                                        </small>
                                    </div>
                                </div>
                                <span class="fw-bold" th:text="${item.product.price * item.quantity} + ' ₽'">0 ₽</span>
                            </li>
                        </ul>
                        
                        <!-- ИСПРАВЛЕННЫЙ БЛОК СУММЫ -->
                        <div class="p-3 bg-light text-end">
                            <span class="me-2 fw-bold">Итого:</span>
                            <span class="fs-4 fw-bold text-danger" th:text="${totalAmount} + ' ₽'">0 ₽</span>
                        </div>
                    </div>
                    
                    <div class="card-body text-center p-4">
                        <p class="text-muted mb-3">Доставка будет оформлена на данные вашего аккаунта.</p>
                        
                        <!-- Форма отправки заказа -->
                        <form th:action="@{/orders/create}" method="post">
                            <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm">
                                <i class="fas fa-shopping-bag me-2"></i>Оформить заказ
                            </button>
                        </form>
                        
                        <a th:href="@{/cart}" class="d-block mt-3 text-decoration-none small text-muted">
                            Вернуться в корзину
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app-config.js}"></script>

</body>
</html>
