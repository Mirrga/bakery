<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <!-- Подключаем Bootstrap для стилей (если еще не подключен в common-header) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<!-- Хедер (можно заменить на фрагмент, если есть) -->
<header th:replace="~{fragments/header :: navbar}"></header>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h2 class="text-center fw-bold mb-4">Регистрация</h2>

                    <!-- 
                      Важно: 
                      1. th:action="@{/auth/register}" - правильный путь к контроллеру
                      2. th:object="${registrationRequest}" - объект формы
                      3. method="post"
                    -->
                    <form th:action="@{/auth/register}" th:object="${registrationRequest}" method="post">
                        
                        <!-- Скрытый токен защиты от повторной отправки -->
                        <input type="hidden" th:name="formToken" th:value="${formToken}" />

                        <!-- Общие ошибки (например, "Email уже занят") -->
                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                        
                        <!-- Ошибки валидации полей -->
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <ul class="mb-0">
                                <li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
                            </ul>
                        </div>

                        <!-- Имя -->
                        <div class="mb-3">
                            <label for="firstName" class="form-label">Имя</label>
                            <input type="text" id="firstName" th:field="*{firstName}" 
                                   class="form-control" placeholder="Иван" required />
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>

                        <!-- Фамилия -->
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Фамилия</label>
                            <input type="text" id="lastName" th:field="*{lastName}" 
                                   class="form-control" placeholder="Иванов" required />
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>

                        <!-- Username (Логин) - НОВОЕ ПОЛЕ -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Придумайте логин</label>
                            <input type="text" id="username" th:field="*{username}" 
                                   class="form-control" placeholder="ivan123" required autocomplete="username"/>
                            <div class="form-text">Это имя будет использоваться для входа.</div>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" id="email" th:field="*{email}" 
                                   class="form-control" placeholder="example@mail.ru" required autocomplete="email"/>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <!-- Пароль -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" id="password" th:field="*{password}" 
                                   class="form-control" placeholder="********" required autocomplete="new-password"/>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <!-- Подтверждение пароля - НОВОЕ ПОЛЕ -->
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Подтвердите пароль</label>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" 
                                   class="form-control" placeholder="********" required autocomplete="new-password"/>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>

                        <!-- Кнопка отправки -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Зарегистрироваться</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">Уже есть аккаунт? <a th:href="@{/auth/login}" class="fw-bold text-decoration-none">Войти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Футер -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app-config.js}"></script>

</body>
</html>
