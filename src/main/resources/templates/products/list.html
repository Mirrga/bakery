<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Подключаем голову из фрагмента -->
    <head th:replace="~{fragments/header :: common-header(title='Каталог выпечки')}"></head>
</head>
<body>

    <!-- Подключаем меню -->
    <header th:replace="~{fragments/header :: navbar}"></header>

    <div class="container mt-5">
        <h1 class="mb-4 text-center">🥐 Свежая выпечка</h1>

        <!-- Проверка на пустоту списка -->
        <div th:if="${products.empty}" class="text-center py-5">
            <p class="text-muted">Товары пока не добавлены.</p>
            <a th:href="@{/}" class="btn btn-primary">На главную</a>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4" th:unless="${products.empty}">
            <div class="col" th:each="product : ${products.content}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x200?text=Bakery'}" 
                         class="card-img-top" alt="Товар" style="height: 200px; object-fit: cover;">
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${product.name}">Название</h5>
                        <p class="card-text text-muted small" th:text="${product.category != null ? product.category.name : 'Без категории'}">Категория</p>
                        <p class="card-text flex-grow-1" th:text="${#strings.abbreviate(product.description, 100)}">Описание</p>
                        
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="fs-5 fw-bold text-danger" th:text="${product.price} + ' ₽'">0 ₽</span>
                            <button class="btn btn-outline-primary btn-sm add-to-cart-btn" 
                                    th:data-product-id="${product.id}">
                                <i class="fas fa-cart-plus me-1"></i> В корзину
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Пагинация -->
        <nav aria-label="Page navigation" class="mt-5" th:if="${products.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${products.number - 1})}">← Назад</a>
                </li>
                <li class="page-item active">
                    <span class="page-link" th:text="${products.number + 1} + ' из ' + ${products.totalPages}">1</span>
                </li>
                <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${products.number + 1})}">Вперед →</a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- 4. ФУТЕР (Универсальный фрагмент) -->
<header th:replace="~{fragments/footer :: footer}"></header>

    <!-- Скрипт для добавления в корзину -->
    <script>
        $(document).ready(function() {
            // Функция показа уведомления
            function showToast(message, isError) {
                const toastEl = document.getElementById('liveToast');
                const toastBody = document.getElementById('toast-message');
                toastBody.textContent = message;
                
                if (isError) {
                    toastEl.classList.remove('bg-success');
                    toastEl.classList.add('bg-danger');
                } else {
                    toastEl.classList.remove('bg-danger');
                    toastEl.classList.add('bg-success');
                }
                
                const toast = new bootstrap.Toast(toastEl);
                toast.show();
            }

            // Обработчик кнопки "В корзину"
            $('.add-to-cart-btn').click(function(e) {
                e.preventDefault();
                let btn = $(this);
                let productId = btn.data('product-id');
                
                // Блокируем кнопку на время запроса
                btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i>');

                $.ajax({
                    url: '/cart/add',
                    type: 'POST',
                    data: { productId: productId, quantity: 1 },
                    success: function(response) {
                        if(response.success) {
                            showToast('Товар добавлен в корзину!');
                            // Обновляем бейдж корзины в хедере (если нужно реализовать динамику)
                            // Пока просто вернем кнопку
                            btn.prop('disabled', false).html('<i class="fas fa-check"></i> Добавлено');
                            setTimeout(() => {
                                btn.prop('disabled', false).html('<i class="fas fa-cart-plus me-1"></i> В корзину');
                            }, 1500);
                        } else {
                            showToast(response.message || 'Ошибка добавления', true);
                            btn.prop('disabled', false).html('<i class="fas fa-cart-plus me-1"></i> В корзину');
                        }
                    },
                    error: function(xhr) {
                        console.error(xhr);
                        showToast('Произошла ошибка сервера', true);
                        btn.prop('disabled', false).html('<i class="fas fa-cart-plus me-1"></i> В корзину');
                    }
                });
            });
        });
    </script>
</body>
</html>
