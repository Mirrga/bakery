<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
        .login-header { text-align: center; margin-bottom: 20px; color: #d63384; }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">
        <h2 class="login-header"><i class="fas fa-bread-slice"></i> Bakery Login</h2>

        <!-- Блок ошибок аутентификации (Spring Security) -->
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle"></i> Неверный логин или пароль.
        </div>

        <!-- Блок успеха регистрации -->
        <div th:if="${param.registered}" class="alert alert-success" role="alert">
            <i class="fas fa-check-circle"></i> Регистрация успешна! Теперь войдите.
        </div>
        
        <!-- Блок выхода -->
        <div th:if="${param.logout}" class="alert alert-info" role="alert">
            <i class="fas fa-sign-out-alt"></i> Вы успешно вышли из системы.
        </div>

        <!-- Общая ошибка (например, от FormToken) -->
        <div th:if="${error}" class="alert alert-warning" role="alert" th:text="${error}">
            Ошибка
        </div>

        <form th:action="@{/auth/login}" method="post">
            
            <!-- ВАШ КАСТОМНЫЙ ТОКЕН (FormTokenService) -->
            <input type="hidden" name="formToken" th:value="${formToken}">

            <div class="mb-3">
                <label for="username" class="form-label">Email или Логин</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="user@example.com">
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="******">
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </div>
        </form>

        <div class="text-center mt-3">
            <small>Нет аккаунта? <a th:href="@{/auth/register}">Зарегистрироваться</a></small>
        </div>
        
        <div class="text-center mt-2">
            <small><a th:href="@{/products}">Вернуться в каталог</a></small>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
